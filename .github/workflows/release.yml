# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          # build-plugin@v1.2.0 defaults go-version to "1.25", but go.mod requires
          # Go 1.26.3 (the mage backend build runs with GOTOOLCHAIN=local, so it
          # cannot auto-download a newer toolchain). Pin it to match go.mod.
          go-version: '1.26.3'
          # NOTE: policy_token is intentionally omitted so the action SKIPS signing
          # and still publishes a draft GitHub release with the unsigned .zip + .sha1.
          # A public plugin CANNOT be signed until the Grafana team reviews it and
          # grants a signature level; attempting to sign beforehand returns HTTP 409
          # (InvalidArgument). First-time catalog submission does not require a signed
          # archive. After the plugin is approved, re-add:
          #   policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          # to sign subsequent release versions.
