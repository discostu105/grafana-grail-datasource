# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        # Plugin signing. Generate an access policy token and store it as the
        # GRAFANA_ACCESS_POLICY_TOKEN repository secret. See:
        # https://grafana.com/developers/plugin-tools/publish-a-plugin/sign-a-plugin#generate-an-access-policy-token
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          # build-plugin@v1.2.0 defaults go-version to "1.25", but go.mod requires
          # Go 1.26.3 (the mage backend build runs with GOTOOLCHAIN=local, so it
          # cannot auto-download a newer toolchain). Pin it to match go.mod.
          go-version: '1.26.3'
